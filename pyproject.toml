[tool.black]
line-length = 120
include = '\.pyi?$'
exclude = '''
/(\n  \.git
| \.hg
| \.mypy_cache
| \.tox
| \.venv
| venv
| _build
| buck-out
| build
| dist
)/
'''

[tool.ruff]
line-length = 120
exclude = [".git", "__pycache__", "build", "dist", "venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E203"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
